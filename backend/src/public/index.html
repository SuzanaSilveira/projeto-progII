<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Amigo Fiel</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <header>
        <div class="logo">🐾 Amigo Fiel</div>

        <nav>
            <a href="#">Início</a>
            <a href="#">Animais</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <section class="hero">
        <div class="texto">
            <h1>Encontre um novo amigo</h1>
            <p>
                Plataforma para ajudar na adoção responsável
                de animais.
            </p>

            <button>Ver animais</button>
        </div>

        <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png"
        alt="Cachorro">
    </section>

    <section class="animais">

        <h2>Animais disponíveis</h2>

        <div class="cards">

            <div class="card">
                <h3>Bolinha 🐶</h3>
                <p>2 anos</p>
                <button>Detalhes</button>
            </div>

            <div class="card">
                <h3>Luna 🐱</h3>
                <p>1 ano</p>
                <button>Detalhes</button>
            </div>

        </div>

    </section>

</body>
</html>
